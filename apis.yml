aid: nile-com
name: Nile
description: >-
  Nile is a San Jose, California enterprise networking company delivering
  an AI-native Secure Network as a Service (NaaS). Founded in 2018 by former
  Cisco executives Pankaj Patel and John Chambers (chairman), Nile replaces
  traditional campus and branch LAN/Wi-Fi hardware-and-license procurement
  with a subscription-based, outcome-guaranteed wired and wireless network
  stack delivered as a service. The Nile Access Service combines its
  purpose-built Zero Trust Fabric (switches, access points, gateways, and
  sensors) with cloud-based autonomous operations, the Nile Services Cloud,
  Nile AI, Nile Nav, and Nile Digital Twin to plan, deploy, monitor, and
  self-heal enterprise networks. The platform emphasizes built-in Zero Trust
  segmentation, continuous performance guarantees (coverage, capacity,
  availability), and consumption-based pricing — marketed against 60%+
  breach reduction, 99%+ ticket reduction, ~3x faster change management,
  and ~40% TCO savings versus traditional enterprise networking. Nile does
  not publish a general-purpose public developer API, OpenAPI specification,
  SDK, CLI, or Terraform provider; its programmable surface is limited to a
  closed admin/portal API and outbound webhooks used for documented
  integrations with ServiceNow (ticket and alert webhooks), Splunk HEC,
  CrowdStrike, Zscaler ZIA, Microsoft Entra (SCIM), Microsoft Intune,
  Microsoft Global Secure Access, Palo Alto Networks, Forescout (device
  inventory API), SecureW2, Aruba ClearPass, VeloCloud, Graphiant, Hamina,
  and Ekahau. Nile is available through the AWS Marketplace as a SaaS
  subscription.
